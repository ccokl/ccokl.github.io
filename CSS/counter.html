<!DOCTYPE html>
<html>

<head>
    <style>
        .couter {
            counter-reset: xxx;
        }

        .xxx::before {
            counter-increment: xxx;
            content: counter(xxx);
        }

        ol {
            counter-reset: section;
            list-style-type: none;
        }

        li::before {
            counter-increment: section;
            content: counters(section, "-") " ";
        }
    </style>
</head>

<body>
    <div class="couter">
        <p class="xxx"></p>
        <p class="xxx"></p>
        <p class="xxx"></p>
    </div>
    <ol>
        <li>item</li> <!-- 1     -->
        <li>item
            <!-- 2     -->
            <ol>
                <li>item</li> <!-- 2.1   -->
                <li>item</li> <!-- 2.2   -->
                <li>item
                    <!-- 2.3   -->
                    <ol>
                        <li>item</li> <!-- 2.3.1 -->
                        <li>item</li> <!-- 2.3.2 -->
                    </ol>
                    <ol>
                        <li>item</li> <!-- 2.3.1 -->
                        <li>item</li> <!-- 2.3.2 -->
                        <li>item</li> <!-- 2.3.3 -->
                    </ol>
                </li>
                <li>item</li> <!-- 2.4   -->
            </ol>
        </li>
        <li>item</li> <!-- 3     -->
        <li>item</li> <!-- 4     -->
    </ol>
    <ol>
        <li>item</li> <!-- 1     -->
        <li>item</li> <!-- 2     -->
    </ol>

</body>

</html>
